# =====================================================================
# EXAMPLE config — copy to config/rules.yaml and fill in your own values.
#   PowerShell:  Copy-Item config/rules.example.yaml config/rules.yaml
# rules.yaml is gitignored (it holds your real sender login + emails).
# =====================================================================

# ---- Rule definitions ----
# type: contains | not_contains | regex | all_keywords | any_keywords
rules:
  - id: error_detected
    name: "Error detected (ERROR/FAILED/TIMEOUT)"
    type: regex
    pattern: "(ERROR|FAILED|TIMEOUT)"
    ignore_case: true
    severity: high
    owner_group: ops_team
    cooldown_minutes: 15
    metadata:
      category: operations
      alert_type: Availability
      target_screen: Browser monitored page
      runbook: RUNBOOK-ERROR-DETECTED
      tags: ["ocr", "error", "timeout"]

  - id: daily_sync_failed
    name: "Daily Sync failed"
    type: all_keywords
    keywords: ["Daily", "Sync", "Failed"]
    ignore_case: true
    severity: medium
    owner_group: ops_team
    cooldown_minutes: 30
    metadata:
      category: batch
      alert_type: Job Failure
      target_screen: Daily sync dashboard
      runbook: RUNBOOK-DAILY-SYNC
      tags: ["ocr", "batch", "sync"]

  - id: payment_keywords
    name: "Payment / fraud alert"
    type: any_keywords
    keywords: ["declined", "chargeback", "fraud"]
    ignore_case: true
    severity: high
    owner_group: finance_team
    cooldown_minutes: 20
    metadata:
      category: finance
      alert_type: Security
      target_screen: Payment monitoring page
      runbook: RUNBOOK-PAYMENT-FRAUD
      tags: ["ocr", "payment", "fraud"]

# ---- Owner groups & recipient emails (NOT verified in Brevo, change freely) ----
owners:
  ops_team:
    emails:
      - trungnt.work.tech@gmail.com
  finance_team:
    emails:
      - finance-owner@example.com

# ---- Email (SMTP) configuration ----
# enabled: false -> DRY-RUN (simulate only, safe default). true -> send for real.
# See README section 5.2 for setting up Brevo as the SMTP relay.
email:
  enabled: false
  provider: custom                       # gmail | outlook | office365 | custom (Brevo/SendGrid)
  smtp_host: smtp-relay.brevo.com
  smtp_port: 587
  use_tls: true
  username: b03ca9001@smtp-brevo.com  # SMTP login (NOT the password)
  from: vietdungpy123@gmail.com     # must be a VERIFIED sender
  password_env: WATCHER_SMTP_PASSWORD        # the SMTP key/password lives in .env

# ---- AI chat (FR04) ----
# Provider / model / API key are chosen in .env (PROVIDER + *_API_KEY / *_MODEL /
# *_ENDPOINT) and re-read on every request. Only non-secret knobs live here:
ai:
  provider: openrouter       # fallback if .env PROVIDER is unset (openrouter|openai|azure_openai|local)
  engine: sdk                # sdk = direct OpenAI-compatible SDK (with DB tools)
                             # opencode = via the OpenCode CLI subprocess (spec §11);
                             #   requires `opencode` on PATH (or env OPENCODE_BIN),
                             #   model override: env OPENCODE_MODEL (e.g. azure/gpt-4o-mini),
                             #   live switch: env CHAT_ENGINE=sdk|opencode
  timeout_seconds: 120       # per-request timeout (spec: 120-180s)
  max_context_chars: 6000    # cap watcher context injected into the prompt
  mock: false                # true -> canned reply (no real LLM needed)

# ---- Watcher API auth (JWT) ----
# The signing secret comes from .env (WATCHER_JWT_SECRET), never here.
auth:
  access_token_minutes: 60     # JWT lifetime
  allow_self_register: true    # public POST /api/auth/register (set false to disable)
  self_register_role: viewer   # role for self-registered users (never 'admin')

# ---- API server (spec §16) ----
server:
  require_api_token: false     # true -> require X-API-Token (env WATCHER_API_TOKEN) on
                               # non-public endpoints (recommended when binding beyond 127.0.0.1)

# ---- Default cooldown ----
# enabled: true  -> cooldown ON  (BR04: a matched rule won't re-send within its window)
# enabled: false -> cooldown OFF (for TESTING: a matched rule ALWAYS sends, ignores the wait)
cooldown:
  default_minutes: 15
  enabled: false

# ---- Issue memory vectorstore ----
# enabled: true -> every matched rule is compared with known issues. If similarity
# >= threshold, the event is treated as known_issue; otherwise a new issue is stored.
issues:
  enabled: true
  similarity_threshold: 0.78
  vector_dimensions: 256

# ---- Audible alert / Vietnamese TTS ----
# The default model id is a Hugging Face GGUF model. Set command when you have a
# local runner installed; placeholders: {text}, {model_id}, {model_path}.
tts:
  enabled: false
  provider: huggingface_gguf
  model_id: pnnbao-ump/VieNeu-TTS-0.3B-q4-gguf
  model_path: ""                       # or set env VIENEU_TTS_MODEL_PATH
  command: []                          # example: ["your-tts-runner", "--model", "{model_path}", "--text", "{text}"]
  alert_text: "anh ơi hệ thống chết toi rồi"
  trigger_on: new_issue                # new_issue | known_issue | every_match
  severities: ["high", "critical", "major"]
  fallback_beep: true
  timeout_seconds: 20
